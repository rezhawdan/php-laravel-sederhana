services:
  # Laravel Web Application
  laravel-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    ports:
      - "8000:80"
    volumes:
      # Bind mount source code (tanpa vendor — ditangani oleh entrypoint)
      - .:/app
      # Anonymous volume agar vendor di container tidak tertimpa bind mount
      - /app/vendor
      - /app/bootstrap/cache
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:f4hBSVM49Hg37D50oy3iI7bs/hts/abMkDICKLnyNbA=
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - LOG_CHANNEL=stack
      - LOG_LEVEL=debug
    networks:
      - laravel-network
    restart: unless-stopped

  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=laravel_db
      - MYSQL_USER=laravel_user
      - MYSQL_PASSWORD=laravel_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ularavel_user", "-plaravel_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  laravel-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
